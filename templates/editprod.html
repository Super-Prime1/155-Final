{% extends "truetemplate.html" %}

{% block content %}
<h2>Edit Product</h2>

<form action="/editprod/{{ product.productid }}" method="POST">

    <label>Title:</label>
    <input type="text" name="title" value="{{ product.title }}" required><br>

    <label>Description:</label>
    <textarea name="description" required>{{ product.description }}</textarea><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price" value="{{ product.price }}" required><br>

    <label>Stock:</label>
    <input type="number" name="instock" value="{{ product.instock }}" required><br>

    <label>Size:</label>
    <select name="size">
        <option value="extra small" {% if product.size == 'extra small' %}selected{% endif %}>Extra Small</option>
        <option value="small" {% if product.size == 'small' %}selected{% endif %}>Small</option>
        <option value="medium" {% if product.size == 'medium' %}selected{% endif %}>Medium</option>
        <option value="large" {% if product.size == 'large' %}selected{% endif %}>Large</option>
        <option value="extra large" {% if product.size == 'extra large' %}selected{% endif %}>Extra Large</option>
    </select><br>

    <label>Warranty ID:</label>
    <input type="number" name="warrantyid" value="{{ product.warrantyid }}"><br>

    <label>Image URL:</label>
    <input type="text" name="image" value="{{ product.image }}"><br>

    <button type="submit">Save Changes</button>
</form>
{% endblock %}
